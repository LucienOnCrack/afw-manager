    function EnableDisablePrimaryInfoControl(isTodisable, itemNumber, ppId) {


        $("#Spp_" + ppId + "_" + itemNumber).prop("disabled", isTodisable);
        $("#OrderModel_" + ppId + "_" + itemNumber).prop("disabled", isTodisable);
        $('#Make_' + ppId + '_' + itemNumber).prop('disabled', isTodisable);

        if ($('#Canvas_' + ppId + '_' + itemNumber)) {
            $('#Canvas_' + ppId + '_' + itemNumber).prop('disabled', isTodisable);
        }
        if ($('#InsideLining_' + ppId + '_' + itemNumber)) {
            $('#InsideLining_' + ppId + '_' + itemNumber).prop('disabled', isTodisable);
        }
        if ($('#SelectedDetachableLiner_0__ID')) {
            $("#SelectedDetachableLiner_0__ID").prop('disabled', isTodisable);
        }

        $("#Fabric_" + itemNumber).prop('disabled', isTodisable);
        if ($("#Lining_" + itemNumber)) {
            $("#Lining_" + itemNumber).prop('disabled', isTodisable);
		}

		if (isExtraLiningUsed) {
			if ($("#WaistcoatLining_" + itemNumber)) {

			}

			if ($("#drpWLbgroup_" + itemNumber)) {
				$("#drpWLbgroup_" + itemNumber).prop('disabled', isTodisable);
			}

        $("#Trim_" + itemNumber).prop('disabled', isTodisable);

        if ($("#drpbgroup_" + itemNumber)) {
            $("#drpbgroup_" + itemNumber).prop('disabled', isTodisable);
        }
    }

    function OnToggleChangeForSSOOrderNumber() {

        var isChecked = GetIsChecked("chkMarkProductPart");

        if (isChecked) {
            GetDialogForCreateOrderFromPreviousOrder(false);
            $("#divOrderTextBox").show();
            $("#ddQuantities").prop("disabled", true);
            $("#HDIsOrderCreationWithSSO").val(true);

            var ppRows = $("[id^=HDPPId_]");
            var itemNumber = 1;

            for (var i = 0; i < ppRows.length; i++) {
                var ppRowId = ppRows[i].id;
                var ppId = ppRowId.replace("HDPPId_", "")

                EnableDisablePrimaryInfoControl(true, itemNumber, ppId);
            }
        }
        else {

            ShowConfirmationModalDialogWithCustomizeText("", GetResourceText("SSO_RESET_INFORMATION", "This will reset all pre-selected information."),
                function () {
                    ResetSSOOrderCopy();
                },
                OnSSCopyOrderCancelled, "", "Continue", "Cancel");
        }
    }


    function ResetSSOOrderCopy() {

        $.ajax({
            type: "POST",
            data: { copyOrder: false, orderNumber: '', orderId: -1 },
            url: "/Customorder/OnCopyOrderFromSSOOrderChanged/",
            success: function (data) {
                if (data.Status) {
                    //All good with Ajax call
                    $("#editOrderNumbers").hide();
                    var ppRows = $("[id^=HDPPId_]");
                    var itemNumber = 1;

                    for (var i = 0; i < ppRows.length; i++) {
                        var ppRowId = ppRows[i].id;
                        var ppId = ppRowId.replace("HDPPId_", "")

                        $("#Spp_" + ppId + "_" + itemNumber).prop("disabled", false);
                        $("#OrderModel_" + ppId + "_" + itemNumber).prop("disabled", false);
                        $("#HDSSOOrderMake_" + ppId).val(-1);
                        $("#HDSSOOrderSPP_" + ppId).val(-1);
                        $("#HDSSOOrderModel" + ppId).val(-1);
                        $("#HDSSOOrderCanvas_" + ppId).val(-1);
                        $("#HDSSOOrderLiningStyle_" + ppId).val(-1);
                        $("#HDSSOOrderTrimId_" + ppId).val(-1);
                        $("#HDSSOOrderIsDeterministicPP_" + ppId).val('');

                        EnableDisablePrimaryInfoControl(false, itemNumber, ppId);
                    }

                    $("#HDSSOOrderId").val(-1);
                    $("#HDSSOOrderPPs").val("");
                    $("#HDSSOOrderFabricId").val(-1);
                    $("#HDSSOOrderFabricExtraDays").val(0);
                    $("#HDSSOOrderLiningExtraDays").val(0);
                    $("#HDSSOOrderLiningId").val(-1);
                    $("#HDSSOOrderQuiltedLiningId").val(-1);
                    $("#HDSSOOrderFabricName").val('');
                    $("#HDSSOOrderLiningNotification").val(false);
                    $("#HDSSOOrderFabricNotification").val(false);
                    $("#HDSSOOrderLiningName").val('');
                    $("#HDSSOOrderAtelierId").val(-1);
                    $("#ddQuantities").prop("disabled", false);
                    $("#HDIsOrderCreationWithSSO").val(false);
                    $("SSOOrderNumber").autocomplete({ source: [] });
                    $("#divOrderTextBox").hide();
					$("#SSOOrderNumber").val('');

					var hasExtraLining = $("#HDShowExtraProductLining").val();
					if (hasExtraLining.toLowerCase() == "true") {
						$("#HDSSOOrderWaistcoatLiningExtraDays").val(0);
						$("#HDSSOOrderWaistcoatLiningId").val(-1);
						$("#HDSSOOrderWaistcoatLiningNotification").val(false);
						$("#HDSSOOrderWaistcoatLiningName").val('');
					}
                    OnCombinationChangeConfimration(true);
                }
            },
            error: function (XMLHttpRequest, textStatus, errorThrown) {

            }
        });
    }


    function OnSSCopyOrderCancelled() {
        SetCheckBoxChecked("chkMarkProductPart", true);
        GetDialogForCreateOrderFromPreviousOrder(false);
    }
